<style>
  :root{--bg0:5,8,15;--bg1:10,17,28;--ink:233,239,247;--ink-dim:124,136,150;--accent:52,176,122;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:#05080f;}
  body{font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  ::selection{background:rgb(var(--accent));color:#04130c;}
  button{font-family:inherit;}
  @keyframes yahrise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes yahspin{to{transform:rotate(360deg);}}
  @keyframes yahbob{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-5px);}}

  /* ---------- Responsive ---------- */
  @media (max-width:900px){
    #yah-head{ top:24px; left:24px; right:24px; max-width:none; pointer-events:none; }
    #yah-head h1{ font-size:clamp(30px,7vw,48px) !important; }
    #yah-poem{ font-size:14px; max-width:min(300px,60vw); }
    #yah-topright{ top:24px !important; right:24px !important; pointer-events:none; }
    #yah-clock{ font-size:26px !important; }
    #yah-botleft{ bottom:24px !important; left:24px !important; }
    #yah-botright{ bottom:24px !important; right:24px !important; }
  }
  @media (max-width:680px){
    #yah-head{ top:16px !important; left:max(16px,env(safe-area-inset-left)) !important; right:max(16px,env(safe-area-inset-right)) !important; }
    #yah-head .yah-eyebrow{ display:none; }
    #yah-head h1{ font-size:clamp(26px,9vw,38px) !important; }
    #yah-poem{ display:none; }
    #yah-topright{ top:16px !important; right:max(16px,env(safe-area-inset-right)) !important; }
    #yah-topright .yah-eyebrow{ font-size:10px; }
    #yah-topright span#yah-phase{ color:rgba(var(--ink),.82) !important; }
    #yah-clock{ font-size:21px !important; margin-top:5px !important; }
    #yah-sky{ font-size:9.5px !important; color:rgba(var(--ink),.7) !important; }
    /* people-alive cluster, bottom-left */
    #yah-botleft{ left:max(16px,env(safe-area-inset-left)) !important; right:auto !important; bottom:max(16px,env(safe-area-inset-bottom)) !important; pointer-events:none; }
    #yah-botleft .yah-label{ font-size:9px !important; letter-spacing:.2em !important; margin-bottom:4px !important; color:rgba(var(--ink),.8) !important; }
    #yah-pop{ font-size:18px !important; }
    #yah-readings{ pointer-events:auto; margin-top:12px !important; font-size:10px !important; padding:8px 12px !important; color:rgba(var(--ink),.92) !important; }
    #yah-readings .yah-rfull{ display:none; }
    /* right controls stacked vertically, bottom-right */
    #yah-botright{ left:auto !important; right:max(16px,env(safe-area-inset-right)) !important; bottom:max(16px,env(safe-area-inset-bottom)) !important; flex-direction:column !important; align-items:flex-end !important; gap:10px !important; }
    #yah-botright > div:first-child{ flex-direction:column !important; align-items:flex-end !important; gap:10px !important; }
    #yah-botright .yah-credits{ display:none; }
    /* compact, logo-only controls */
    #yah-sound, #yah-share, #yah-rotate, #yah-labels{ font-size:10px !important; padding:10px !important; gap:0 !important; justify-content:center !important; }
    #yah-sound .yah-blabel, #yah-share .yah-blabel, #yah-rotate .yah-blabel, #yah-labels .yah-blabel{ display:none !important; }
    #yah-share span:last-child{ font-size:14px !important; }
    /* find-me: compact, left-aligned, with clear gap above the people cluster */
    #yah-invite{ left:max(16px,env(safe-area-inset-left)) !important; right:auto !important; bottom:124px !important; transform:none !important; justify-content:center; font-size:13px !important; padding:11px 16px !important; gap:9px !important; }
    #yah-invitelabel{ display:none !important; }
    #yah-invitelabel-sm{ display:inline !important; }
    #yah-hint{ font-size:10px !important; bottom:auto !important; top:84px !important; color:rgba(var(--ink),.7) !important; }
    #yah-panel{ width:100vw !important; border-left:none !important; }
  }
  /* very small devices: find-me shows only its logo */
  @media (max-width:380px){
    #yah-invitelabel-sm{ display:none !important; }
    #yah-invite{ padding:11px !important; gap:0 !important; }
    #yah-invite > span:first-child{ width:12px !important; height:12px !important; }
  }
  @media (max-width:680px) and (max-height:560px){
    #yah-botleft .yah-label{ display:none; }
    #yah-invite{ bottom:96px !important; }
    #yah-hint{ display:none !important; }
  }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#070d16"/><g fill="none" stroke-width="2.4"><circle cx="50" cy="50" r="22" stroke="#2f6fe6" stroke-dasharray="1.5 4"/><circle cx="50" cy="50" r="14" stroke="#34b07a" stroke-dasharray="1.5 4"/></g><circle cx="50" cy="50" r="3.4" fill="#fff"/></svg>
</template>

<div id="yah-root" style="position:fixed;inset:0;color:rgb(var(--ink));background:radial-gradient(128% 120% at 50% 40%, rgb(var(--bg1)) 0%, rgb(var(--bg0)) 72%);">
  <canvas id="yah-glcanvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none;"></canvas>
  <canvas id="yah-canvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:grab;background:transparent;"></canvas>
  <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(135% 105% at 50% 50%, transparent 52%, rgba(0,0,0,.30) 100%);"></div>

  <header id="yah-head" style="position:absolute;top:34px;left:40px;max-width:44vw;z-index:5;">
    <div class="yah-eyebrow" style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.36em;color:rgb(var(--ink-dim));margin-bottom:16px;">AN INTERACTIVE PLANET</div>
    <h1 style="margin:0;font-weight:600;font-size:clamp(32px,4.6vw,60px);line-height:.9;letter-spacing:-.02em;color:rgb(var(--ink));text-transform:uppercase;">You are<br>here</h1>
    <p id="yah-poem" style="margin:18px 0 0;max-width:312px;font-size:15px;line-height:1.55;color:rgb(var(--ink-dim));">No edges. No away. Eight billion of us, aboard one small, turning world.</p>
  </header>

  <div id="yah-topright" style="position:absolute;top:34px;right:40px;text-align:right;z-index:5;font-family:'IBM Plex Mono',monospace;">
    <button id="yah-themetoggle" title="Theme · auto / day / night" style="display:inline-flex;align-items:center;justify-content:flex-end;gap:9px;font-size:11px;letter-spacing:.26em;color:rgb(var(--ink-dim));font-family:'IBM Plex Mono',monospace;background:transparent;border:none;cursor:pointer;padding:2px 0;opacity:.72;transition:opacity .2s,color .2s;" style-hover="opacity:1;color:rgb(var(--ink));">
      <span id="yah-themeicon" style="display:inline-flex;align-items:center;color:rgb(var(--accent));"><span id="yah-phasedot" style="width:7px;height:7px;border-radius:50%;background:rgb(var(--accent));box-shadow:0 0 10px rgb(var(--accent));"></span></span>
      <span id="yah-phase">NIGHT</span>
    </button>
    <div id="yah-clock" style="font-size:31px;font-weight:300;letter-spacing:.01em;color:rgb(var(--ink));margin-top:8px;font-variant-numeric:tabular-nums;">--:--:--</div>
    <div id="yah-sky" style="font-size:11px;color:rgb(var(--ink-dim));margin-top:3px;letter-spacing:.08em;">your local sky</div>
  </div>

  <div id="yah-botleft" style="position:absolute;bottom:32px;left:40px;z-index:5;">
    <div class="yah-label" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.28em;color:rgb(var(--ink-dim));margin-bottom:6px;">PEOPLE ALIVE RIGHT NOW</div>
    <div id="yah-pop" style="font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:400;color:rgb(var(--ink));font-variant-numeric:tabular-nums;">&mdash;</div>
    <button id="yah-readings" style="margin-top:18px;display:inline-flex;align-items:center;gap:9px;background:transparent;border:1px solid rgba(var(--ink),.18);color:rgb(var(--ink));font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;padding:9px 15px;border-radius:999px;cursor:pointer;transition:background .2s,border-color .2s;" style-hover="background:rgba(var(--ink),.09);">
      <span style="width:6px;height:6px;border-radius:50%;background:rgb(var(--accent));"></span><span class="yah-rfull">PLANETARY </span>READINGS
    </button>
  </div>

  <div id="yah-botright" style="position:absolute;bottom:32px;right:40px;z-index:5;display:flex;flex-direction:column;align-items:flex-end;gap:16px;">
    <div style="display:flex;gap:10px;">
      <button id="yah-rotate" style="background:transparent;border:1px solid rgba(var(--ink),.18);color:rgb(var(--ink));font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;padding:9px 15px;border-radius:999px;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:8px;" style-hover="background:rgba(var(--ink),.09);"><span id="yah-rotateglyph" style="display:inline-flex;color:rgb(var(--accent));flex:none;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></span><span class="yah-blabel">SPIN</span></button>
      <button id="yah-labels" style="background:transparent;border:1px solid rgba(var(--ink),.18);color:rgb(var(--ink));font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;padding:9px 15px;border-radius:999px;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:8px;" style-hover="background:rgba(var(--ink),.09);"><span id="yah-labelsglyph" style="display:inline-flex;color:rgb(var(--accent));flex:none;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg></span><span class="yah-blabel">LABELS</span></button>
      <button id="yah-sound" style="background:transparent;border:1px solid rgba(var(--ink),.18);color:rgb(var(--ink));font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;padding:9px 15px;border-radius:999px;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:8px;" style-hover="background:rgba(var(--ink),.09);"><span id="yah-soundglyph" style="display:inline-flex;color:rgb(var(--ink-dim));flex:none;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg></span><span class="yah-blabel">SOUND</span></button>
      <button id="yah-share" style="background:transparent;border:1px solid rgba(var(--ink),.18);color:rgb(var(--ink));font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;padding:9px 15px;border-radius:999px;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:6px;" style-hover="background:rgba(var(--ink),.09);"><span style="display:inline-flex;color:inherit;flex:none;"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg></span><span class="yah-blabel">SHARE</span></button>
    </div>
    <div class="yah-credits" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:rgb(var(--ink-dim));text-align:right;line-height:1.7;">
      DOT&middot;EARTH &mdash; 2026<br><a id="yah-contact" href="#" style="color:rgb(var(--ink-dim));text-decoration:none;border-bottom:1px solid rgba(var(--ink),.22);padding-bottom:1px;">made for everyone aboard</a>
    </div>
  </div>

  <div id="yah-hint" style="position:absolute;left:50%;bottom:100px;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.24em;color:rgb(var(--ink-dim));opacity:0;pointer-events:none;z-index:5;display:none;"></div>

  <button id="yah-invite" style="position:absolute;right:40px;bottom:148px;transform:none;opacity:0;pointer-events:none;display:inline-flex;align-items:center;gap:11px;background:rgb(var(--ink));color:rgb(var(--bg0));border:none;font-size:14.5px;font-weight:500;padding:14px 24px;border-radius:999px;cursor:pointer;box-shadow:0 10px 34px rgba(0,0,0,.4);z-index:6;">
    <span style="width:9px;height:9px;border-radius:50%;border:2px solid rgb(var(--bg0));"></span><span id="yah-invitelabel">Find my place on Earth</span><span id="yah-invitelabel-sm" style="display:none;">Find me</span>
  </button>

  <aside id="yah-panel" style="position:absolute;top:0;right:0;bottom:0;width:min(384px,88vw);background:rgba(var(--bg0),.9);border-left:1px solid rgba(var(--ink),.12);transform:translateX(101%);z-index:20;display:flex;flex-direction:column;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:30px 28px 18px;border-bottom:1px solid rgba(var(--ink),.1);">
      <div>
        <div style="font-weight:600;font-size:19px;letter-spacing:-.01em;">Planetary readings</div>
        <div id="yah-updated" style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:rgb(var(--ink-dim));margin-top:5px;">&mdash;</div>
      </div>
      <button id="yah-close" style="background:transparent;border:1px solid rgba(var(--ink),.2);color:rgb(var(--ink));width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;flex:none;" style-hover="background:rgba(var(--ink),.09);">&times;</button>
    </div>
    <div id="yah-panelbody" style="flex:1;overflow-y:auto;padding:22px 28px 32px;"></div>
  </aside>

  <div id="yah-toast" style="position:absolute;left:50%;bottom:104px;transform:translate(-50%,8px);opacity:0;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;background:rgb(var(--ink));color:rgb(var(--bg0));padding:9px 16px;border-radius:999px;z-index:30;pointer-events:none;">copied</div>
</div>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals(){ return {}; }

  componentDidMount(){
    if (this._init) return; this._init = true;
    const $ = id => document.getElementById(id);
    this.els = {
      root:$('yah-root'), canvas:$('yah-canvas'), glcanvas:$('yah-glcanvas'), clock:$('yah-clock'), phase:$('yah-phase'), themeicon:$('yah-themeicon'),
      sky:$('yah-sky'), pop:$('yah-pop'), poem:$('yah-poem'), invite:$('yah-invite'),
      inviteLabel:$('yah-invitelabel'), inviteLabelSm:$('yah-invitelabel-sm'), hint:$('yah-hint'),
      panel:$('yah-panel'), panelBody:$('yah-panelbody'), updated:$('yah-updated'),
      toast:$('yah-toast'), soundGlyph:$('yah-soundglyph'), rotateGlyph:$('yah-rotateglyph'), labelsGlyph:$('yah-labelsglyph')
    };
    this.labelsOn=true;
    this.themeMode='auto';   // 'auto' (local time) | 'day' | 'night' — discreet top-right toggle
    this.ctx = this.els.canvas.getContext('2d');
    this.initGL();   // sets this.gl when WebGL is available; everything degrades to Canvas2D if not

    // ---- constants -----------------------------------------------------
    this.D2R = Math.PI/180; this.R2D = 180/Math.PI;
    this.TYPE = {
      wildfire:[255,107,53], flood:[60,160,235], cyclone:[140,110,255],
      earthquake:[212,140,60], drought:[230,170,62], heatwave:[255,84,84], volcano:[255,72,42]
    };
    this.TYPE_LABEL = { wildfire:'Wildfire', flood:'Flood', cyclone:'Cyclone', earthquake:'Earthquake', drought:'Drought', heatwave:'Heatwave', volcano:'Volcano' };

    // palette stops (rgb arrays)
    this.NIGHT = {bg0:[5,8,15],bg1:[11,18,30],ink:[233,239,247],dim:[122,136,152],land:[54,178,124],water:[58,118,224],acc:[54,178,124]};
    this.TWI   = {bg0:[26,18,28],bg1:[66,40,50],ink:[250,237,224],dim:[180,146,136],land:[72,202,142],water:[78,134,236],acc:[234,162,92]};
    this.DAY   = {bg0:[235,239,236],bg1:[219,228,223],ink:[20,28,24],dim:[104,120,112],land:[18,120,76],water:[28,84,188],acc:[18,120,76]};

    // ---- motion state --------------------------------------------------
    this.ay = -0.6; this.ax = 0.18; this.ayVel = 0; this.axVel = 0;
    this.auto = 0.0017;
    this.autoRotate = true;   // gentle drift on by default; toggle with the SPIN control or spacebar
    this.fly = null;          // {ay,ax,t,dur, user:bool}
    this.user = null;         // {lat,lon,vec}
    this.locatedAt = 0;
    this.dragging = false; this.interacted = false;
    this.zoom = 1; this.zoomT = 1; this.ZMIN = 0.62; this.ZMAX = 3.4;
    this.anim={panel:0,invite:0,hint:0,toast:0}; this.animT={panel:0,invite:0,hint:0,toast:0};
    this.mx = 0; this.my = 0; this.px = 0; this.py = 0; // cursor + smoothed parallax
    this.focus = null;          // {vec} point you located or tapped; roots the connection arcs
    this.ripples = [];          // one-shot expanding waves {vec, t0}

    // theme current/target
    this.cur = this.cloneP(this.NIGHT);
    this.tgt = this.cloneP(this.NIGHT);

    this.resize();
    window.addEventListener('resize', ()=>this.resize());
    // pause all rendering while the tab is hidden -> zero background CPU/GPU draw
    document.addEventListener('visibilitychange', ()=>{ this._hidden=document.hidden; if(!document.hidden) this._tprev=performance.now(); });
    this.bindPointer();
    this.bindUI();

    this.loadImage('assets/land-mask.png')
      .then(img => { this.buildPoints(img); })
      .catch(()=> { this.buildPoints(null); });

    this.fetchData();
    this.loadCities();

    // theme: start from local-clock estimate, refine on locate
    this.refreshSolar();
    this.updateSun();
    this._solarTimer = setInterval(()=>this.refreshSolar(), 20000);

    // gentle onboarding
    setTimeout(()=>{ if(!this.interacted) this.els.hint.style.opacity='.85'; }, 1600);
    setTimeout(()=>{ this.showInvite(); }, 5200);

    this._tprev = performance.now();
    this._loop = this.loop.bind(this);
    requestAnimationFrame(this._loop);
  }

  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); if(this._solarTimer) clearInterval(this._solarTimer); }

  cloneP(p){ const o={}; for(const k in p) o[k]=p[k].slice(); return o; }

  loadImage(src){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }

  // ---- geometry ------------------------------------------------------
  latlonToVec(lat,lon){ const la=lat*this.D2R, lo=lon*this.D2R; const cl=Math.cos(la); return [cl*Math.sin(lo), Math.sin(la), cl*Math.cos(lo)]; }

  buildPoints(img){
    // ---- Single even fibonacci sphere ----
    // One sphere is the most even arrangement possible (overlaying several causes moiré / clumps).
    // High density keeps it clean and detailed at every zoom; dot SIZE scales with zoom so close-up
    // it reads as a fine even stipple rather than fat blobs.
    const N = 32000; this.N = N;
    this.X=new Float32Array(N); this.Y=new Float32Array(N); this.Z=new Float32Array(N); this.land=new Uint8Array(N);
    let data=null,W=0,H=0;
    if(img){ const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight; const cx=c.getContext('2d'); cx.drawImage(img,0,0); try{ const id=cx.getImageData(0,0,c.width,c.height); data=id.data; W=c.width; H=c.height; }catch(e){ data=null; } }
    const ga=Math.PI*(3-Math.sqrt(5));
    for(let i=0;i<N;i++){
      let y=1-((i+0.5)/N)*2; if(y>1)y=1; if(y<-1)y=-1;
      const r=Math.sqrt(Math.max(0,1-y*y)); const th=ga*i;
      const x=Math.cos(th)*r, z=Math.sin(th)*r;
      this.X[i]=x; this.Y[i]=y; this.Z[i]=z;
      let isLand=0;
      if(data){ const lat=Math.asin(y)*this.R2D, lon=Math.atan2(x,z)*this.R2D; const u=(lon+180)/360, v=(90-lat)/180; const px=Math.min(W-1,Math.max(0,(u*W)|0)), py=Math.min(H-1,Math.max(0,(v*H)|0)); if(data[(py*W+px)*4]>128) isLand=1; }
      this.land[i]=isLand;
    }
    this.pointsReady = true;
    this.uploadGL();
  }

  // ---- data ----------------------------------------------------------
  fetchData(){
    fetch('assets/earth-data.json').then(r=>r.json()).then(d=>{
      this.data=d;
      // guard: only keep events with valid numeric coordinates, so a malformed feed can never break the globe
      this.events=(d.events||[]).filter(e=>typeof e.lat==='number'&&typeof e.lon==='number'&&isFinite(e.lat)&&isFinite(e.lon)&&Math.abs(e.lat)<=90&&Math.abs(e.lon)<=180);
      this.popBase = d.population.count; this.popRate = d.population.perSecond;
      this.popAt = Date.parse(d.population.asOf);
      this.els.updated.textContent = 'UPDATED '+(d.meta.updated||'').replace(/-/g,'.');
      this.buildPanel();
      if(this.pointsReady) this.applyDataInfluence();
    }).catch(()=>{ this.events=[]; });
  }

  applyDataInfluence(){
    // Disaster dot-recoloring removed to keep continents crisp; events shown via markers only.
    if(this.infl) this.infl.fill(0);
    return;
    if(!this.events||!this.events.length) return;
    const evs = this.events.map(e=>({v:this.latlonToVec(e.lat,e.lon), w:e.severity, c:this.TYPE[e.type]||[255,255,255]}));
    const sigma=0.135, inv=1/(sigma*sigma);
    this.infl.fill(0);
    for(let i=0;i<this.N;i++){
      const x=this.X[i],y=this.Y[i],z=this.Z[i];
      let tot=0, cr=0,cg=0,cb=0;
      for(let k=0;k<evs.length;k++){ const e=evs[k]; const dot=x*e.v[0]+y*e.v[1]+z*e.v[2]; const ang=Math.acos(Math.max(-1,Math.min(1,dot))); const g=e.w*Math.exp(-(ang*ang)*inv); tot+=g; cr+=g*e.c[0]; cg+=g*e.c[1]; cb+=g*e.c[2]; }
      if(tot>0.09){ this.dom[i*3]=cr/tot; this.dom[i*3+1]=cg/tot; this.dom[i*3+2]=cb/tot; let f=Math.min(0.62, tot*0.24); if(!this.land[i]) f*=0.12; this.infl[i]=f; }
    }
  }

  buildPanel(){
    const d=this.data; if(!d) return;
    const arrow = t => t==='up' ? '&#9650;' : t==='down' ? '&#9660;' : '&#8226;';
    const acol = t => t==='up' ? '230,150,70' : t==='down' ? '70,170,235' : 'var(--ink-dim)';
    let h = '';
    h += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;letter-spacing:.26em;color:rgb(var(--ink-dim));margin:2px 0 14px;">GLOBAL VITALS</div>';
    d.climate.forEach(m=>{
      h += '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:12px 0;border-bottom:1px solid rgba(var(--ink),.08);">'
        + '<div><div style="font-size:14px;color:rgb(var(--ink));">'+m.label+'</div><div style="font-size:11px;color:rgb(var(--ink-dim));margin-top:2px;">'+m.context+'</div></div>'
        + '<div style="text-align:right;white-space:nowrap;"><span style="font-family:\'IBM Plex Mono\',monospace;font-size:18px;color:rgb(var(--ink));">'+m.value+'</span> <span style="font-size:11px;color:rgb(var(--ink-dim));">'+m.unit+'</span> <span style="color:rgb('+acol(m.trend)+');font-size:10px;">'+arrow(m.trend)+'</span></div>'
        + '</div>';
    });
    h += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;letter-spacing:.26em;color:rgb(var(--ink-dim));margin:26px 0 6px;">LIVE EVENTS &middot; '+this.events.length+'</div>';
    this.events.forEach(e=>{
      const c=this.TYPE[e.type]||[255,255,255]; const cs=c.join(',');
      let bars=''; for(let s=1;s<=5;s++){ bars += '<span style="width:5px;height:5px;border-radius:1px;background:rgb('+cs+');opacity:'+(s<=e.severity?1:.18)+';"></span>'; }
      h += '<button class="yah-ev" data-lat="'+e.lat+'" data-lon="'+e.lon+'" style="width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid rgba(var(--ink),.08);padding:12px 0;cursor:pointer;display:flex;gap:12px;align-items:flex-start;">'
        + '<span style="width:9px;height:9px;border-radius:50%;background:rgb('+cs+');box-shadow:0 0 8px rgba('+cs+',.7);margin-top:4px;flex:none;"></span>'
        + '<span style="flex:1;min-width:0;"><span style="display:flex;justify-content:space-between;gap:8px;"><span style="font-size:13.5px;color:rgb(var(--ink));">'+e.name+'</span><span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:rgb(var(--ink-dim));white-space:nowrap;">'+this.TYPE_LABEL[e.type]+'</span></span>'
        + '<span style="display:flex;justify-content:space-between;align-items:center;margin-top:3px;"><span style="font-size:11px;color:rgb(var(--ink-dim));">'+e.place+'</span><span style="display:flex;gap:2px;">'+bars+'</span></span></span>'
        + '</button>';
    });
    h += '<p style="font-size:11px;line-height:1.6;color:rgb(var(--ink-dim));margin:22px 0 0;">'+d.meta.source+'</p>';
    this.els.panelBody.innerHTML = h;
    this.els.panelBody.querySelectorAll('.yah-ev').forEach(b=>{
      b.addEventListener('click', ()=>{ this.flyTo(parseFloat(b.dataset.lat), parseFloat(b.dataset.lon), false); this.closePanel(); });
    });
  }

  // ---- solar / theme -------------------------------------------------
  solarElev(lat,lon,date){
    const start=Date.UTC(date.getUTCFullYear(),0,0); const N=(date-start)/86400000;
    const decl=-23.44*Math.cos(this.D2R*(360/365)*(N+10));
    const utc=date.getUTCHours()+date.getUTCMinutes()/60+date.getUTCSeconds()/3600;
    const lonSub=(12-utc)*15;
    let H=lon-lonSub; H=((H+540)%360)-180;
    const e=Math.asin(Math.sin(lat*this.D2R)*Math.sin(decl*this.D2R)+Math.cos(lat*this.D2R)*Math.cos(decl*this.D2R)*Math.cos(H*this.D2R))*this.R2D;
    return {elev:e, rising:H<0};
  }

  refreshSolar(){
    const now=new Date();
    // Theme follows LOCAL time consistently (the device clock already reflects the user's location),
    // so pressing "locate" only re-centers the globe and never jars the theme. Smooth civil-day curve:
    // sunrise ~6h, noon peak, sunset ~18h, deep night past ~20h — the loop lerps between palettes softly.
    const h=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
    const elev=62*Math.sin(2*Math.PI*(h-6)/24);
    const rising=h<12;
    this.elev=elev; this.rising=rising;
    this.tgt = this.paletteFor(elev);
    // manual theme override (discreet top-right toggle): force the palette while leaving the
    // globe's real geographic sun position untouched, so day/night lighting stays accurate.
    if(this.themeMode==='day') this.tgt=this.cloneP(this.DAY);
    else if(this.themeMode==='night') this.tgt=this.cloneP(this.NIGHT);
    // phase label
    let ph; if(this.themeMode==='day') ph='DAY'; else if(this.themeMode==='night') ph='NIGHT'; else ph=(this.cur.bg0[0]>128?'DAY':'NIGHT');
    this.els.phase.textContent=ph;
    this.updateThemeIcon();
  }

  paletteFor(e){
    const lerp=(a,b,t)=>({bg0:this.mix(a.bg0,b.bg0,t),bg1:this.mix(a.bg1,b.bg1,t),ink:this.mix(a.ink,b.ink,t),dim:this.mix(a.dim,b.dim,t),land:this.mix(a.land,b.land,t),water:this.mix(a.water,b.water,t),acc:this.mix(a.acc,b.acc,t)});
    if(e>=12) return this.cloneP(this.DAY);
    if(e<=-9) return this.cloneP(this.NIGHT);
    if(e<2){ const t=(e+9)/11; return lerp(this.NIGHT,this.TWI,t); }
    const t=(e-2)/10; return lerp(this.TWI,this.DAY,t);
  }
  mix(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }

  // subsolar direction (earth-fixed): where the sun is straight overhead right now
  updateSun(){
    const now=new Date();
    const start=Date.UTC(now.getUTCFullYear(),0,0); const Nd=(now-start)/86400000;
    const decl=-23.44*Math.cos(this.D2R*(360/365)*(Nd+10));        // solar declination
    const utc=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
    const subLon=(12-utc)*15;                                       // longitude of solar noon
    this.sunVec=this.latlonToVec(decl,subLon);
  }

  loadCities(){
    fetch('assets/cities.json').then(r=>r.json()).then(d=>{
      const list=d.cities||d;
      this.cities=list.map(c=>({ v:this.latlonToVec(c[0],c[1]), w:c[2]||1 }));
    }).catch(()=>{});
  }

  drawCityLights(ctx,cx,cy,R,sy,cyk,sx,cxk,tt){
    if(!this.cities) return;
    const sun=this.sunVec||[0,0,1];
    for(let i=0;i<this.cities.length;i++){
      const c=this.cities[i], v=c.v;
      const r=this.rot(v,sy,cyk,sx,cxk);
      if(r[2]<=0.03) continue;                                  // back of globe
      const illum=v[0]*sun[0]+v[1]*sun[1]+v[2]*sun[2];
      let night=(0.07-illum)/0.27; if(night<=0) continue; if(night>1)night=1;  // fades across the terminator
      const px=cx+r[0]*R, py=cy-r[1]*R;
      const depth=Math.min(1,r[2]+0.2);
      const tw=0.8+0.2*Math.sin(tt*2.4+i*1.7);                  // gentle twinkle
      const amp=night*depth*tw;
      if(amp<0.02) continue;
      const rad=(0.9+c.w*0.85)*(0.7+0.5*depth);
      // layered glow for a more luminous, qualitative city light:
      // 1) wide warm amber halo  2) mid golden bloom  3) hot near-white core
      ctx.globalAlpha=Math.min(0.32,0.2*amp); ctx.fillStyle='rgb(255,176,96)'; ctx.beginPath(); ctx.arc(px,py,rad*3.0,0,7); ctx.fill();
      ctx.globalAlpha=Math.min(0.6,0.4*amp); ctx.fillStyle='rgb(255,206,140)'; ctx.beginPath(); ctx.arc(px,py,rad*1.5,0,7); ctx.fill();
      ctx.globalAlpha=Math.min(1,amp*1.3); ctx.fillStyle='rgb(255,247,224)'; ctx.beginPath(); ctx.arc(px,py,rad*0.46,0,7); ctx.fill(); ctx.globalAlpha=1;
    }
  }

  applyVars(){
    const r=document.documentElement.style;
    const s=a=>a[0].toFixed(0)+','+a[1].toFixed(0)+','+a[2].toFixed(0);
    r.setProperty('--bg0',s(this.cur.bg0)); r.setProperty('--bg1',s(this.cur.bg1));
    r.setProperty('--ink',s(this.cur.ink)); r.setProperty('--ink-dim',s(this.cur.dim));
    r.setProperty('--accent',s(this.cur.acc));
  }

  // ---- interaction ---------------------------------------------------
  bindPointer(){
    const c=this.els.canvas;
    const down=e=>{ this.dragging=true; this.fly=null; this.lastX=e.clientX; this.lastY=e.clientY; this._downX=e.clientX; this._downY=e.clientY; this._downT=performance.now(); c.style.cursor='grabbing'; this.markInteract(); };
    const move=e=>{ const r=c.getBoundingClientRect(); this.mx=e.clientX-r.left; this.my=e.clientY-r.top; if(!this.dragging||this.pinching) return; const dx=e.clientX-this.lastX, dy=e.clientY-this.lastY; this.lastX=e.clientX; this.lastY=e.clientY; this.ay+=dx*0.0052; this.ax+=dy*0.0052; this.ayVel=dx*0.0052; this.axVel=dy*0.0052; };  // free, unclamped tilt — rotate in any direction
    const up=e=>{ if(this.dragging && e){ const dist=Math.hypot(e.clientX-this._downX,e.clientY-this._downY), dt=performance.now()-this._downT; if(dist<6 && dt<450) this.pickGlobe(e.clientX,e.clientY); } this.dragging=false; c.style.cursor='grab'; };
    c.addEventListener('pointerdown',down); window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
    // Trackpad-native wheel: pinch (ctrl+wheel) zooms, two-finger slide rotates.
    // Mouse wheel zooms (mouse wheels send pure-vertical, large, quantized deltas with no deltaX).
    c.addEventListener('wheel',e=>{ e.preventDefault(); this.markInteract();
      const isMouseWheel = !e.ctrlKey && e.deltaX===0 && Math.abs(e.deltaY)>=24 && Number.isInteger(e.deltaY);
      if(e.ctrlKey || isMouseWheel){ const f=Math.exp(-e.deltaY*(isMouseWheel?0.0015:0.01)); this.zoomT=Math.max(this.ZMIN,Math.min(this.ZMAX,this.zoomT*f)); }
      else { this.fly=null; this.ay-=e.deltaX*0.0045; this.ax-=e.deltaY*0.0045; this.ayVel=-e.deltaX*0.0009; this.axVel=-e.deltaY*0.0009; }  // reversed trackpad pan
    },{passive:false});
    // keyboard: arrows rotate, +/- zoom, space toggles drift
    window.addEventListener('keydown',e=>{
      const tag=e.target&&e.target.tagName; if(tag==='INPUT'||tag==='TEXTAREA') return;
      if(e.key===' '){ e.preventDefault(); this.toggleRotate(); }
      else if(e.key==='ArrowLeft'){ this.fly=null; this.ay-=0.09; this.markInteract(); }
      else if(e.key==='ArrowRight'){ this.fly=null; this.ay+=0.09; this.markInteract(); }
      else if(e.key==='ArrowUp'){ this.fly=null; this.ax+=0.07; this.markInteract(); }
      else if(e.key==='ArrowDown'){ this.fly=null; this.ax-=0.07; this.markInteract(); }
      else if(e.key==='+'||e.key==='='){ this.zoomT=Math.min(this.ZMAX,this.zoomT*1.12); }
      else if(e.key==='-'||e.key==='_'){ this.zoomT=Math.max(this.ZMIN,this.zoomT/1.12); }
    });
    // pinch
    let pd=0, pz=1;
    // pinch zoom — while two fingers are down we set this.pinching so the rotate handler bails out,
    // so zooming in/out no longer drags the globe around.
    c.addEventListener('touchstart',e=>{ if(e.touches.length>=2){ this.pinching=true; this.dragging=false; pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); pz=this.zoomT; } },{passive:true});
    c.addEventListener('touchmove',e=>{ if(e.touches.length>=2 && pd){ e.preventDefault(); const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); this.zoomT=Math.max(this.ZMIN,Math.min(this.ZMAX,pz*d/pd)); } },{passive:false});
    const endPinch=e=>{ if(!e.touches || e.touches.length<2){ this.pinching=false; pd=0; } };
    c.addEventListener('touchend',endPinch); c.addEventListener('touchcancel',endPinch);
  }

  markInteract(){ if(this.interacted) return; this.interacted=true; this.animT.hint=0; }

  bindUI(){
    const $=id=>document.getElementById(id);
    this.els.invite.addEventListener('click',()=>this.geolocate());
    $('yah-readings').addEventListener('click',()=>this.openPanel());
    $('yah-close').addEventListener('click',()=>this.closePanel());
    $('yah-sound').addEventListener('click',()=>this.toggleSound());
    $('yah-rotate').addEventListener('click',()=>this.toggleRotate());
    $('yah-labels').addEventListener('click',()=>this.toggleLabels());
    $('yah-themetoggle').addEventListener('click',()=>this.cycleTheme());
    $('yah-share').addEventListener('click',()=>this.share());
    $('yah-contact').addEventListener('click',(e)=>{ e.preventDefault(); this.share(); });
  }

  toggleRotate(){
    this.autoRotate=!this.autoRotate;
    this.markInteract();
    const gl=this.els.rotateGlyph;
    if(gl){ gl.style.color=this.autoRotate?'rgb(var(--accent))':'rgb(var(--ink-dim))'; }
    this.toast(this.autoRotate?'drifting':'paused here');
  }

  toggleLabels(){
    this.labelsOn=!this.labelsOn;
    this.markInteract();
    const gl=this.els.labelsGlyph;
    if(gl){ gl.style.color=this.labelsOn?'rgb(var(--accent))':'rgb(var(--ink-dim))'; }
    this.toast(this.labelsOn?'labels on':'labels off');
  }

  // discreet day/night theme explorer: each click flips to the opposite of what's shown now
  cycleTheme(){
    const isLight = this.cur.bg0[0] > 128;
    this.themeMode = isLight ? 'night' : 'day';
    this.markInteract();
    this.refreshSolar();   // retargets the palette (this.tgt) honoring the override; loop lerps cur → tgt
    this.updateThemeIcon();
    this.toast(this.themeMode==='day'?'theme · day':'theme · night');
  }

  updateThemeIcon(){
    const el=this.els.themeicon; if(!el) return;
    // icon reflects the theme currently shown (sun = light, moon = dark)
    const light = (this.themeMode==='day') || (this.themeMode==='auto' && this.cur.bg0[0] > 128);
    const sun='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"></circle><line x1="12" y1="2" x2="12" y2="4.6"></line><line x1="12" y1="19.4" x2="12" y2="22"></line><line x1="4.2" y1="4.2" x2="6" y2="6"></line><line x1="18" y1="18" x2="19.8" y2="19.8"></line><line x1="2" y1="12" x2="4.6" y2="12"></line><line x1="19.4" y1="12" x2="22" y2="12"></line><line x1="4.2" y1="19.8" x2="6" y2="18"></line><line x1="18" y1="6" x2="19.8" y2="4.2"></line></svg>';
    const moon='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"></path></svg>';
    el.innerHTML = light ? sun : moon;
  }

  openPanel(){ this.animT.panel=1; }
  closePanel(){ this.animT.panel=0; }

  showInvite(){ if(this.user) return; this.markInteract(); this.animT.invite=1; }
  hideInvite(){ this.animT.invite=0; }

  setInviteLabel(long, short){ if(this.els.inviteLabel) this.els.inviteLabel.textContent=long; if(this.els.inviteLabelSm) this.els.inviteLabelSm.textContent=short; }

  geolocate(){
    this.setInviteLabel('Looking for you…','Looking…');
    if(!navigator.geolocation){ this.hideInvite(); return; }
    navigator.geolocation.getCurrentPosition(
      p=>this.setUser(p.coords.latitude,p.coords.longitude),
      ()=>{ this.setInviteLabel('Find my place on Earth','Find me'); this.hideInvite(); },
      {enableHighAccuracy:false,timeout:9000,maximumAge:600000}
    );
  }

  setUser(lat,lon){
    this.user={lat,lon,vec:this.latlonToVec(lat,lon)};
    this.locatedAt=performance.now();
    this.setFocus(this.user.vec);
    this.hideInvite();
    this.flyTo(lat,lon,true);
    this.refreshSolar();
    const ns = lat>=0?'N':'S', ew = lon>=0?'E':'W';
    this.els.sky.textContent = Math.abs(lat).toFixed(2)+'\u00b0'+ns+'  '+Math.abs(lon).toFixed(2)+'\u00b0'+ew;
    this.els.poem.textContent = 'There you are. The same light, the same dark, reaches every other dot on this sphere.';
  }

  flyTo(lat,lon,asUser){
    const v=this.latlonToVec(lat,lon);
    const ayT=-Math.atan2(v[0],v[2]);
    const z1=Math.sqrt(v[0]*v[0]+v[2]*v[2]);
    const axT=Math.atan2(v[1],z1);
    // unwrap ay to nearest
    let cur=this.ay; let t=ayT; while(t-cur>Math.PI)t-=2*Math.PI; while(t-cur<-Math.PI)t+=2*Math.PI;
    this.fly={ay0:cur,ax0:this.ax,ay:t,ax:axT,t:0,dur:1700,user:asUser};
    this.ayVel=0; this.axVel=0;
  }

  // set the focus point (roots the arcs) and emit a one-shot ripple from it
  setFocus(vec){ this.focus={vec}; this.ripples.push({vec, t0:performance.now()}); if(this.ripples.length>4) this.ripples.shift(); }

  // convert a screen tap to the unit-sphere point under it (inverse of the draw projection)
  pickGlobe(clientX,clientY){
    const r=this.els.canvas.getBoundingClientRect();
    const cx=this.cx+this.px, cy=this.cy+this.py, R=this.Rg*this.zoom;
    const vx=(clientX-r.left-cx)/R, vy=-(clientY-r.top-cy)/R;
    const q=vx*vx+vy*vy; if(q>0.98) return;            // tapped off the globe
    const vz=Math.sqrt(1-q);
    // invert rotation: undo X-tilt then Y-spin
    const sy=Math.sin(this.ay),cyk=Math.cos(this.ay),sx=Math.sin(this.ax),cxk=Math.cos(this.ax);
    const y=vy*cxk+vz*sx; const z1=-vy*sx+vz*cxk;
    const x=vx*cyk - z1*sy; const z=vx*sy + z1*cyk;
    this.markInteract();
    this.setFocus([x,y,z]);
    this.els.poem.textContent = 'Everywhere it happens, it reaches here too. One world, one weather.';
  }

  // ---- audio ---------------------------------------------------------
  toggleSound(){
    if(!this.audio){
      const AC=window.AudioContext||window.webkitAudioContext; const ac=new AC();
      // master: controlled ONLY by the toggle, so "off" always stays off
      const master=ac.createGain(); master.gain.value=0; master.connect(ac.destination);
      // mellow low-pass that slowly "breathes" — gives gentle motion without volume pumping
      const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=680; lp.Q.value=0.2; lp.connect(master);
      const flfo=ac.createOscillator(); flfo.type='sine'; flfo.frequency.value=0.045;
      const fg=ac.createGain(); fg.gain.value=170; flfo.connect(fg); fg.connect(lp.frequency); flfo.start();
      const mix=ac.createGain(); mix.gain.value=0.5; mix.connect(lp);
      // a warm, open major chord in a calm mid register (C3–G3–C4–E4), each voice softly detune-layered
      const voice=(f,gain,detune)=>{ const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f; o.detune.value=detune||0; const g=ac.createGain(); g.gain.value=gain; o.connect(g); g.connect(mix); o.start(); return o; };
      voice(130.81,0.42,-4); voice(130.81,0.42,4);    // C3 (chorused)
      voice(196.00,0.30,-3); voice(196.00,0.30,5);    // G3
      voice(261.63,0.22,0);                            // C4
      voice(329.63,0.14,3);                            // E4 — soft shimmer
      this.audio={ac,master};
    }
    if(this.audio.ac.state==='suspended') this.audio.ac.resume();
    this.soundOn=!this.soundOn;
    const g=this.audio.master.gain; const now=this.audio.ac.currentTime;
    g.cancelScheduledValues(now); g.setValueAtTime(g.value,now); g.linearRampToValueAtTime(this.soundOn?0.075:0, now+(this.soundOn?2.2:1.1));
    const onSvg='<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';

  initGL(){

  // one-shot tap/locate feedback: an expanding ring on the 2D overlay (replaces the old per-dot ripple)
  drawRipples(ctx,t,cx,cy,R,sy,cyk,sx,cxk){
    if(!this.ripples||!this.ripples.length) return;
    const accStr=this.cur.acc.map(Math.round).join(',');
    for(let k=this.ripples.length-1;k>=0;k--){ const rp=this.ripples[k]; const age=(t-rp.t0)/1000; if(age>1.75){ this.ripples.splice(k,1); continue; }

    for(let i=0;i<N;i++){
      const x=X[i],y=Y[i],zc=Zc[i];
      const x1=x*cyk+zc*sy; const z1=-x*sy+zc*cyk;
      const y2=y*cxk - z1*sx; const z2=y*sx + z1*cxk;
      if(z2<-0.16) continue;
      const sxp=cx+x1*R, syp=cy-y2*R;
      const tdepth=(z2+1)*0.5;
      let a=z2+0.18; if(a>1)a=1; if(a<0.04)a=0.04; a*=a>0.5?1:0.9;
      const rr=baseR*(0.5+0.5*tdepth);
      const illum=x*sun[0]+y*sun[1]+zc*sun[2];
      let L=(illum+0.3)/0.6; if(L<0)L=0; if(L>1)L=1;
      const TW=0.30; let dw=(illum+TW)/(2*TW); if(dw<0)dw=0; if(dw>1)dw=1; dw=dw*dw*(3-2*dw);
      const aL=a*(0.22+0.78*L), rL=rr*(0.58+0.42*L);
      const aN=a*(0.62+0.38*L), rN=rr*(0.72+0.28*L);
      if(dw>0.004){ const ad=aL*dw; if(LD[i]){ BL.x[nl]=sxp;BL.y[nl]=syp;BL.r[nl]=rL;BL.a[nl]=ad;nl++; } else { BW.x[nw]=sxp;BW.y[nw]=syp;BW.r[nw]=rL;BW.a[nw]=ad;nw++; } }
      if(dw<0.996){ const an=aN*(1-dw); if(LD[i]){ BLn.x[nln]=sxp;BLn.y[nln]=syp;BLn.r[nln]=rN;BLn.a[nln]=an;nln++; } else { BWn.x[nwn]=sxp;BWn.y[nwn]=syp;BWn.r[nwn]=rN;BWn.a[nwn]=an;nwn++; } }
    }
    const landStr='rgb('+this.cur.land.map(Math.round).join(',')+')', waterStr='rgb('+this.cur.water.map(Math.round).join(',')+')';
    this.drawBatch(ctx,BWn,nwn,'rgb(9,14,28)',0.95,0.82);
    this.drawBatch(ctx,BLn,nln,'rgb(20,29,40)',1.15,1.04);
    this.drawBatch(ctx,BW,nw,waterStr,0.6,0.78);
    this.drawBatch(ctx,BL,nl,landStr,1.25,1.12);
    ctx.globalAlpha=1;
  }

  // Batched dot renderer: bucket dots by quantized alpha into Path2D groups, fill each group once.
  // Turns ~thousands of globalAlpha+fillRect calls into ~11 fills per colour group.
  drawBatch(ctx,B,n,fill,am,rm){
    if(n<=0) return;
    const L=11, P=this._pbuf||(this._pbuf=[]);
    for(let l=0;l<L;l++) P[l]=new Path2D();
    for(let i=0;i<n;i++){
      let a=B.a[i]*am; if(a<0.03) continue; if(a>1)a=1;
      let li=(a*L)|0; if(li>=L)li=L-1;
      const r=B.r[i]*rm, h=r*0.5;
      P[li].rect(B.x[i]-h,B.y[i]-h,r,r);
    }
    ctx.fillStyle=fill;
    for(let l=0;l<L;l++){ ctx.globalAlpha=(l+0.5)/L; ctx.fill(P[l]); }
    ctx.globalAlpha=1;
  }

  rot(v,sy,cyk,sx,cxk){ const x1=v[0]*cyk+v[2]*sy; const z1=-v[0]*sy+v[2]*cyk; const y2=v[1]*cxk-z1*sx; const z2=v[1]*sx+z1*cxk; return [x1,y2,z2]; }
  roundRect(ctx,x,y,w,h,r){ if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; } r=Math.min(r,h/2,w/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  rotDepth(v,sy,cyk,sx,cxk){ const z1=-v[0]*sy+v[2]*cyk; return v[1]*sx+z1*cxk; }

  drawArcs(ctx,cx,cy,R,sy,cyk,sx,cxk,tt){
    const acc=this.cur.acc; const accStr=acc.map(Math.round).join(',');
    // arcs only exist once you have a focus point (located or tapped): each live event is linked
    // back to where you are — the "same boat" made literal. Pulses travel event -> you (incoming).
    if(!this.focus) return;
    let pairs=[];
    this.events.forEach(e=>pairs.push([this.latlonToVec(e.lat,e.lon),this.focus.vec,e]));
    const STEPS=30;
    pairs.forEach((pr,idx)=>{
      const a=pr[0],b=pr[1];
      let dotp=a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; dotp=Math.max(-1,Math.min(1,dotp)); const om=Math.acos(dotp); if(om<1e-3) return; const so=Math.sin(om);
      const lift=0.16+Math.min(0.16,om*0.07);
      ctx.beginPath(); let started=false; let pts=[];
      for(let s=0;s<=STEPS;s++){ const tt2=s/STEPS; const k1=Math.sin((1-tt2)*om)/so, k2=Math.sin(tt2*om)/so; let vx=k1*a[0]+k2*b[0], vy=k1*a[1]+k2*b[1], vz=k1*a[2]+k2*b[2]; const h=1+Math.sin(tt2*Math.PI)*lift; vx*=h;vy*=h;vz*=h; const r=this.rot([vx,vy,vz],sy,cyk,sx,cxk); const px=cx+r[0]*R, py=cy-r[1]*R; pts.push([px,py,r[2]]); }
      // draw visible segments
      for(let s=0;s<pts.length-1;s++){ const p=pts[s],q=pts[s+1]; if(p[2]<-0.05&&q[2]<-0.05) continue; const al=Math.max(0,Math.min(1,(Math.max(p[2],q[2])+0.2)))*0.5; ctx.strokeStyle='rgba('+accStr+','+al.toFixed(3)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.lineTo(q[0],q[1]); ctx.stroke(); }
      // travelling pulse
      const ph=(tt*0.22+idx*0.13)%1; const si=Math.floor(ph*(pts.length-1)); const pp=pts[si]; if(pp&&pp[2]>-0.02){ ctx.globalAlpha=Math.min(1,pp[2]+0.3); ctx.fillStyle='rgb('+accStr+')'; ctx.beginPath(); ctx.arc(pp[0],pp[1],2.0,0,7); ctx.fill(); ctx.globalAlpha=1; }
    });
  }

  drawMarkers(ctx,cx,cy,R,sy,cyk,sx,cxk,tt){
    let frontMost=null,fd=0.55;
    this.events.forEach(e=>{
      const v=this.latlonToVec(e.lat,e.lon); const r=this.rot(v,sy,cyk,sx,cxk); if(r[2]<0) return;
      const px=cx+r[0]*R*1.0, py=cy-r[1]*R*1.0;
      const c=this.TYPE[e.type]||[255,255,255]; const cs=c.join(',');
      const pulse=0.5+0.5*Math.sin(tt*2.0 + e.lat);
      const rad=1.7+e.severity*0.5;
      // soft halo as a cheap alpha disc (no per-frame gradient allocation)
      ctx.globalAlpha=Math.min(0.5,0.45*r[2]); ctx.fillStyle='rgb('+cs+')'; ctx.beginPath(); ctx.arc(px,py,rad*1.6,0,7); ctx.fill(); ctx.globalAlpha=1;
      // pulsing ring radiates outward then fades
      ctx.strokeStyle='rgba('+cs+','+(0.45*(1-pulse)*r[2]).toFixed(3)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(px,py,rad+pulse*rad*2.0,0,7); ctx.stroke();
      // crisp core
      ctx.globalAlpha=Math.min(1,r[2]+0.3); ctx.fillStyle='rgb('+cs+')'; ctx.beginPath(); ctx.arc(px,py,rad*0.7,0,7); ctx.fill(); ctx.globalAlpha=1;
      if(r[2]>fd){ fd=r[2]; frontMost={e,px,py,c:cs}; }
    });
    if(frontMost && this.labelsOn){ const f=frontMost; ctx.font='500 12px "IBM Plex Mono", monospace'; ctx.textBaseline='middle';
      let label=f.e.name+'  ·  '+f.e.place;
      const margin=12, dotW=14, padX=11, bh=24, gap=14;
      // truncate the label if the pill would be wider than the screen (long names on phones)
      const maxBw=this.w-margin*2;
      let tw=ctx.measureText(label).width;
      if(tw+padX*2+dotW>maxBw){
        const allow=maxBw-padX*2-dotW;
        while(label.length>4 && ctx.measureText(label+'\u2026').width>allow){ label=label.slice(0,-1); }
        label+='\u2026'; tw=ctx.measureText(label).width;
      }
      const bw=tw+padX*2+dotW;
      // horizontal: prefer right of the marker, flip left if it would overflow, then clamp on-screen
      let bx = (f.px+gap+bw<=this.w-margin) ? f.px+gap
             : (f.px-gap-bw>=margin)        ? f.px-gap-bw
             :                                f.px+gap;
      bx=Math.max(margin, Math.min(bx, this.w-margin-bw));
      // vertical: keep the pill fully on-screen
      let by=Math.max(margin, Math.min((f.py-12)-bh/2, this.h-margin-bh));
      const ly=by+bh/2;
      // leader line from marker to the nearest edge of the pill
      const anchorX=(bx>f.px)?bx:bx+bw;
      ctx.strokeStyle='rgba('+f.c+',.7)'; ctx.lineWidth=1; ctx.beginPath();
      ctx.moveTo(f.px+(anchorX>f.px?5:-5), f.py-5); ctx.lineTo(anchorX+(anchorX>f.px?-4:4), ly); ctx.stroke();
      // soft, blurred dark pill behind the text so it stays readable over land and water
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=14; ctx.shadowOffsetY=1;
      ctx.fillStyle='rgba(6,10,18,.66)';
      this.roundRect(ctx,bx,by,bw,bh,bh/2); ctx.fill();
      ctx.restore();
      // severity dot + white label
      ctx.fillStyle='rgb('+f.c+')'; ctx.beginPath(); ctx.arc(bx+padX+1,ly,3,0,7); ctx.fill();
      ctx.fillStyle='#ffffff'; ctx.fillText(label,bx+padX+dotW,ly);
    }
  }

  // ---- text tickers --------------------------------------------------
  updateText(t){
    if(!this._txt || t-this._txt>240){ this._txt=t;
      const now=new Date();
      this.els.clock.textContent = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
      if(this.popBase){ const live=this.popBase+this.popRate*((Date.now()-this.popAt)/1000); this.els.pop.textContent=this.fmt(Math.floor(live)); }
    }
  }
  fmt(n){ const s=String(n); let o=''; for(let i=0;i<s.length;i++){ if(i>0 && (s.length-i)%3===0) o+='\u202f'; o+=s[i]; } return o; }
}
</script>
